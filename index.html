    <script>
      try {
        const savedTheme = localStorage.getItem("bichon-color-theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch {
        // The app will use the light theme when browser storage is unavailable.
      }
    </script>
